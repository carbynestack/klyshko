# This file defines the default values for all variables used in the Klyshko Operator Helm Chart.

imagePullSecrets: []

controller:
  image:
    registry: ghcr.io
    repository: carbynestack/klyshko-operator-controller
    pullPolicy: IfNotPresent
    tag: latest
  etcd:
    endpoint: 172.18.1.129:2379
    dialTimeout: 5
  castorUrl: http://cs-castor.default.svc.cluster.local:10100
  vcpIp:
  ingress:
    portRange:
      min: 30500
      max: 30504
  egress:
    portRange:
      min: 30500
      max: 30550
    serviceHost: istio-egressgateway.istio-system.svc.cluster.local
    gatewayName: partner-egressgateway
  tls:
    enabled: false
    secretName:


provisioner:
  image:
    registry: ghcr.io
    repository: carbynestack/klyshko-provisioner
    tag: latest
