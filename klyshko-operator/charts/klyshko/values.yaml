# This file defines the default values for all variables used in the Klyshko Operator Helm Chart.

imagePullSecrets: []

controller:
  image:
    registry: ghcr.io
    repository: carbynestack/klyshko-operator-controller
    pullPolicy: IfNotPresent
    tag: latest
  etcd:
    endpoint: 172.18.1.129:2379
    dialTimeout: 5
  castorUrl: http://cs-castor.default.svc.cluster.local:10100
  tls:
    mode: disabled
    secretName:
  logLevel: info


provisioner:
  image:
    registry: ghcr.io
    repository: carbynestack/klyshko-provisioner
    tag: latest
